name: Backend CI

on:
  push:
    branches: [main]
    paths: ["app/**", "requirements.txt"]
  pull_request:
    branches: [main]
    paths: ["app/**", "requirements.txt"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest app/ -v
